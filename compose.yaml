name: automacao-backbone

include:
  - Chatwoot/compose.yaml
  - evolution/compose.yaml
  - n8n/compose.yaml

services:
  # ──────────────────────────────────────────────────────────
  # MINIO SETUP SYNC
  # Agora rodando diretamente na rede backbone_internal para garantir o bucket.
  # ──────────────────────────────────────────────────────────
  minio_setup_sync:
    image: minio/mc:latest
    container_name: minio_setup_sync
    env_file: .env
    networks:
      - backbone_internal
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Configura o alias para o MinIO (backbone_minio é o hostname na rede backbone_internal)
        mc alias set primary_minio http://backbone_minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
        
        echo "[minio_setup] Garantindo bucket '${S3_BUCKET:-chatwoot}'..."
        mc mb --ignore-existing primary_minio/${S3_BUCKET:-chatwoot}
        
        echo "[minio_setup] Configurando pasta pública..."
        mc mb --ignore-existing primary_minio/${S3_BUCKET:-chatwoot}/public
        mc anonymous set public primary_minio/${S3_BUCKET:-chatwoot}/public
        
        echo "[minio_setup] Bucket pronto no MinIO do servidor!"
        exit 0

networks:
  backbone_internal:
    external: true
