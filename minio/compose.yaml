services:
  # ──────────────────────────────────────────────────────────
  # OBJECT STORAGE (MinIO)
  # API S3  → porta host ${S3_PORT:-9006}:9000
  # Console → porta host ${S3_CONSOLE_PORT:-9007}:9001
  #
  # IMPORTANTE: O servidor já possui outro MinIO (app backbone)
  # rodando internamente na rede backbone_internal (sem porta exposta).
  # Este MinIO é exclusivo da stack Automacao-BackBone e usa
  # portas 9006/9007 no host para evitar qualquer conflito futuro.
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: backbone_minio_automation
    command: server /data --console-address ":9001"
    ports:
      - "${S3_PORT:-9006}:9000"    # API S3 (diferente do backbone: 9006)
      - "${S3_CONSOLE_PORT:-9007}:9001" # Console (diferente do backbone: 9007)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
      # CRÍTICO: Define a URL pública para geração de URLs presignadas.
      # Sem isso, o MinIO usa o hostname interno (backbone_minio_automation)
      # que o browser não consegue resolver (ERR_NAME_NOT_RESOLVED).
      MINIO_SERVER_URL: "https://minio.projetoravenna.cloud"
      MINIO_BROWSER_REDIRECT_URL: "https://minio.projetoravenna.cloud"
    volumes:
      - s3_data:/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stack_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ──────────────────────────────────────────────────────────
  # MINIO BUCKET CREATOR
  # Garante que o bucket definido em S3_BUCKET exista na inicialização.
  # Roda apenas uma vez e encerra.
  # ──────────────────────────────────────────────────────────
  createbuckets:
    image: minio/mc:latest
    container_name: backbone_minio_setup_automation
    depends_on:
      minio:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-chatwoot}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo "Aguardando MinIO ficar disponivel..."
          sleep 2
        done

        # Bucket principal do Chatwoot
        mc mb --ignore-existing minio/${S3_BUCKET:-chatwoot}
        # Subpasta pública para avatares e imagens públicas
        mc mb --ignore-existing minio/${S3_BUCKET:-chatwoot}/public
        mc anonymous set public minio/${S3_BUCKET:-chatwoot}/public

        echo "Bucket '${S3_BUCKET:-chatwoot}' pronto."
        exit 0
    networks:
      - stack_network
    restart: "no"

volumes:
  s3_data:

networks:
  stack_network:
    external: true
