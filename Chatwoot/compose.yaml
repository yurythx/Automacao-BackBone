services:
  base: &base
    image: ${CHATWOOT_IMAGE:-chatwoot/chatwoot:v4.12.1}
    profiles: ["donotstart"]
    env_file:
      - ../.env
    environment:
      # Rails Configuration
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      
      # Database Configuration
      POSTGRES_HOST: chatwoot_db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot_production
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Redis Configuration
      REDIS_URL: redis://:${REDIS_PASSWORD}@chatwoot_redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Storage (MinIO Local)
      ACTIVE_STORAGE_SERVICE: s3_compatible
      STORAGE_PROXY: "true"
      ACTIVE_STORAGE_URL_STRATEGY: proxy
      
      # Endpoint Interno (Para Upload do Backend)
      S3_ENDPOINT: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      STORAGE_ENDPOINT: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      
      # Alias Público (Para o Navegador do Usuário resolver via Túnel)
      S3_ALIAS_URL: https://${MINIO_DOMAIN:-minio.projetoravenna.cloud}
      STORAGE_ALIAS_URL: https://${MINIO_DOMAIN:-minio.projetoravenna.cloud}
      
      S3_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-backbone-media}
      S3_BUCKET: ${AWS_STORAGE_BUCKET_NAME:-backbone-media}
      STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-backbone-media}
      
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-CHANGE_ME_DATABASE_PASSWORD}
      STORAGE_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      STORAGE_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-CHANGE_ME_DATABASE_PASSWORD}
      
      AWS_REGION: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_S3_REGION_NAME:-us-east-1}
      S3_REGION: ${AWS_S3_REGION_NAME:-us-east-1}
      STORAGE_REGION: ${AWS_S3_REGION_NAME:-us-east-1}
      
      S3_FORCE_PATH_STYLE: "true"
      AWS_S3_FORCE_PATH_STYLE: "true"
      STORAGE_FORCE_PATH_STYLE: "true"
      
      # Frontend & Security
      FRONTEND_URL: https://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}
      ACTIVE_STORAGE_HOST: https://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}
      RAILS_ASSET_HOST: https://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}
      CABLE_URL: wss://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}/cable
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      FORCE_SSL: ${FORCE_SSL:-true}
      TRUSTED_PROXIES: 0.0.0.0/0
    volumes:
      - chatwoot_data:/app/storage
    networks:
      - backbone_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    init: true

  web:
    <<: *base
    profiles: []
    container_name: chatwoot_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    entrypoint: docker/entrypoints/rails.sh
    command: ['sh', '-c', 'bundle exec rails db:prepare && bundle exec rails s -p 3000 -b 0.0.0.0']
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    <<: *base
    profiles: []
    container_name: chatwoot_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep sidekiq | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    networks:
      - backbone_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot_production"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: always
    env_file:
      - ../.env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backbone_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  backbone_internal:
    name: backbone_backbone_internal
    external: true

volumes:
  chatwoot_data:
  postgres_data:
  redis_data:
