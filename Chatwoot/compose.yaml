services:
  base: &base
    image: ${CHATWOOT_IMAGE:-chatwoot/chatwoot:v4.12.1}
    profiles: ["donotstart"]
    # Removido env_file para evitar que valores vazios no .env sobreponham o compose
    environment:
      # Rails Configuration
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      
      # Database Configuration (Puxando valores seguros do .env via shell, com fallbacks)
      POSTGRES_HOST: chatwoot_db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot_production
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Redis Configuration
      REDIS_URL: redis://:${REDIS_PASSWORD}@chatwoot_redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Storage (MinIO Local via Domínio Público)
      ACTIVE_STORAGE_SERVICE: s3_compatible
      STORAGE_PROXY: true
      
      # ENDPOINT E REGIAO (Valores fixos para garantir o boot)
      S3_ENDPOINT: https://minio.projetoravenna.cloud
      AWS_S3_ENDPOINT: https://minio.projetoravenna.cloud
      S3_ALIAS_URL: https://minio.projetoravenna.cloud
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      S3_REGION: us-east-1
      
      S3_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-backbone-media}
      S3_BUCKET: ${AWS_STORAGE_BUCKET_NAME:-backbone-media}
      
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-backbone_minio_root_2026}
      
      S3_FORCE_PATH_STYLE: true
      
      # Frontend & Security
      FRONTEND_URL: https://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}
      ACTIVE_STORAGE_HOST: https://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}
      RAILS_ASSET_HOST: https://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}
      CABLE_URL: wss://${CHATWOOT_DOMAIN:-atendimento.projetoravenna.cloud}/cable
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-56877bd0e6ea08129e843210456789abcdeffedcba098765432101234567890abcdef}
      FORCE_SSL: true
      TRUSTED_PROXIES: 0.0.0.0/0
    volumes:
      - chatwoot_data:/app/storage
    networks:
      - backbone_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    init: true

  web:
    <<: *base
    profiles: []
    container_name: chatwoot_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    entrypoint: docker/entrypoints/rails.sh
    # Simplificado o comando para focar no essencial agora que o ambiente está fixo
    command: ['sh', '-c', 'bundle exec rails db:prepare && bundle exec rake tmp:clear && bundle exec rails s -p 3000 -b 0.0.0.0']
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    <<: *base
    profiles: []
    container_name: chatwoot_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep sidekiq | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    networks:
      - backbone_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot_production"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backbone_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  backbone_internal:
    name: backbone_backbone_internal
    external: true

volumes:
  chatwoot_data:
  postgres_data:
  redis_data:
